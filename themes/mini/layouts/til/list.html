{{ define "main" }}
  <section>
    {{ .Content }}
  </section>
  <dl>
    {{ range .Pages.ByPublishDate.Reverse }}
    <div>
      <span class="subdued">{{ .Date.Format "January 02, 2006" }}</span>
      <dt><a href="{{ .Params.source }}" target="_blank">{{ .Title }}</a></dt>
      <dd>{{ .Summary }}</dd>
    </div>
    {{ end }}
  </dl>

{{ end }}
