{{ define "main" }}
  <section class="intro">
    {{ .Content }}
  </section>
  <dl>
    {{ range .Pages.ByPublishDate.Reverse }}
      <dt><a href="{{ .RelPermalink }}">{{ .Title }}</a> <span class="meta subdued">by {{ .Params.author }}</span></dt>
      <dd>{{ .Summary }}</dd>
    {{ end }}
  </dl>

{{ end }}
