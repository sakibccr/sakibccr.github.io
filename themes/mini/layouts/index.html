{{ define "main" }}

{{ .Content }}
<h2>Latest</h2>
<table>
  {{ $pages := where site.RegularPages "Type" "in" site.Params.mainSections }}
  {{ range $pages.ByPublishDate.Reverse }}
  <tr>
    <td class="date">{{ .Date.Format "Jan 02, 2006" }}</td>
    <td><a href="{{ .RelPermalink }}">{{ .Title }}</a></td>
  </tr>
  {{ end }}
</table>
{{ end }}
